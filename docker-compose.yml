version: '3.8'

services:
  web:
    build: .
    container_name: wc-polla-web
    depends_on:
      db:
        condition: service_healthy  # ← Espera a que DB esté saludable
    environment:
      - DATABASE_URL=postgresql://polla:secret@db:5432/worldcup
    ports:
      - "8000:8000"
    networks:
      - worldcup_network
    restart: on-failure

  db:
    image: postgres:15-alpine
    container_name: wc-polla-db
    environment:
      - POSTGRES_USER=polla
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=worldcup
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - worldcup_network
    # ✅ IMPORTANTE: healthcheck para saber cuándo está lista
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polla -d worldcup"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  worldcup_network:
    driver: bridge