version: '3.8'

services:
  web:
    build: .
    container_name: wc-polla-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://polla:secret@db:5432/worldcup
    networks:
      - worldcup_network
    restart: on-failure
    # ❌ NO exponemos puertos en Dokploy (lo maneja automáticamente)

  db:
    image: postgres:15-alpine
    container_name: wc-polla-db
    environment:
      - POSTGRES_USER=polla
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=worldcup
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - worldcup_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polla -d worldcup"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  worldcup_network:
    driver: bridge