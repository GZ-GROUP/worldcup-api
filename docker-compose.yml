version: '3'

services:
  web:
    build: .
    depends_on:
      - db
    volumes:
      - ./:/code:ro
    environment:
      - DATABASE_URL=postgresql://polla:secret@db:5432/worldcup
    ports:
      - "8000"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=polla
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=worldcup

volumes:
  postgres_data:

networks:
  default:
    name: worldcup_network
    driver: bridge